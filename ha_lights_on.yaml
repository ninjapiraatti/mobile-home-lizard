alias: lights_on
description: ""
trigger:
  - type: carbon_dioxide
    platform: device
    device_id: 31ba1b5bd3614abfeacb038175a4549a
    entity_id: 1e8cc8ffcad56b891c16329e0b75bf42
    domain: sensor
    above: 0
    enabled: false
    id: co2
  - platform: state
    entity_id:
      - sensor.deepsleeptest_wakeup_cause
    from: null
    to: null
    id: deepsleep
  - platform: mqtt
    topic: mobile-home-lizard/switch/lights/command
    payload: "ON"
    id: mobile_home_lizard
  - platform: mqtt
    topic: wooden-box/button/toggle
    payload: "pressed"
    id: wooden_box
condition:
  - condition: or
    conditions:
      # Mobile Home Lizard bypasses the light state check
      - condition: trigger
        id: mobile_home_lizard
      # Other triggers: only turn on if ALL lights are off
      - condition: template
        value_template: >-
          {% set areas = ['bedroom', 'dining', 'living_room'] %}
          {% set ns = namespace(any_on=false) %}
          {% for area in areas %}
            {% for eid in area_entities(area) %}
              {% if eid.startswith('light.') and states(eid) == 'on' %}
                {% set ns.any_on = true %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ not ns.any_on }}
action:
  - metadata: {}
    data: {}
    target:
      area_id:
        - bedroom
        - dining
        - living_room
    action: light.turn_on
mode: single
